services:
  database:
    image: postgres:16
    container_name: sagui-db
    environment:
      POSTGRES_DB: sagui
      POSTGRES_USER: sagui
      POSTGRES_PASSWORD: sagui
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sagui -d sagui"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./back
    container_name: sagui-backend
    ports:
      - "8080:8080"
    env_file:
      - .env
    depends_on:
      database:
        condition: service_healthy

volumes:
  postgres_data: