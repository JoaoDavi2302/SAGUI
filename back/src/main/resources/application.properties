spring.application.name=SAGUI

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/sagui}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:sagui}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:sagui}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true